---
name: Data Portal tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    django-ci:
        name: Django Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Prepare environment
              run: ./scripts/setup.sh

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  registry: dhi.io
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Set up Docker Compose
              uses: docker/setup-compose-action@v2

            - name: Build from Dockerfile
              run: docker compose build

            - name: Start services
              run: docker compose up -d

            - name: Show container logs
              run: docker compose logs

            - name: Check for missing migrations
              run: |
                  docker compose exec web \
                      python manage.py makemigrations --check

            - name: Run tests with coverage
              run: |
                  docker compose exec web \
                      coverage run manage.py test

            - name: Create XML coverage file
              run: |
                  docker compose exec web \
                      coverage xml
                  docker compose cp \
                      web:/usr/src/app/coverage.xml coverage.xml

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v6
              with:
                  files: coverage.xml
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: biodiversitycellatlas/bca-website
                  flags: django

            - name: Show coverage report
              run: |
                  docker compose exec web \
                      coverage report --skip-covered

            - name: Run deployment check
              run: |
                  docker compose exec web \
                      python manage.py check --deploy

    bun-ci:
        name: Bun Tests (Typescript)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install JS/CSS dependencies
              run: bun install

            - name: Run tests with coverage
              run: bun test --coverage --coverage-reporter=lcov

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v6
              with:
                  files: ./coverage/lcov.info
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: biodiversitycellatlas/bca-website
                  flags: typescript
