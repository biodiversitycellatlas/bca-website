---
name: Data Portal tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    e2e-tests:
        name: End-to-end tests with Playwright
        runs-on: ubuntu-latest
        environment:
            name: test
            deployment: false

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Prepare test environment
              run: ./scripts/setup.sh e2e

            - name: Log in to Docker Hub
              uses: docker/login-action@v4.1.0
              with:
                  registry: dhi.io
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Set up Docker Compose
              uses: docker/setup-compose-action@v2.1.0

            - name: Build from Dockerfiles
              run: docker compose build

            - name: Start services
              run: docker compose up -d
              env:
                  ENVIRONMENT: test

            - name: Run tests with playwright
              run: bash -c "sleep 80; docker compose exec web pytest e2e/ -v"
